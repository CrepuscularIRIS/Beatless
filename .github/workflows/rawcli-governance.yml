name: rawcli-governance

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Shell syntax check
        run: |
          for f in scripts/rawcli/*.sh; do
            bash -n "$f"
          done

      - name: Validate rawcli contracts
        run: python3 scripts/ci/validate_rawcli_contracts.py
