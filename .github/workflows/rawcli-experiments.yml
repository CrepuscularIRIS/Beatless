name: rawcli-experiments

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'

jobs:
  experiment-batches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Shell syntax
        run: |
          bash -n scripts/rawcli/rawcli_experiment_batch.sh
          bash -n scripts/rawcli/rawcli_cron_tick.sh
          bash -n scripts/rawcli/normalize_visual_evidence.sh
          bash -n scripts/rawcli/codex_state_repair.sh

      - name: Run fixture contracts
        run: |
          python3 scripts/ci/validate_rawcli_contracts.py
          bash scripts/ci/validate_routing_contracts.sh
          bash scripts/ci/validate_receipt_contracts.sh
          bash scripts/ci/test_receipt_schema_gate.sh

      - name: Run experiment batch (dry-run)
        env:
          EXPERIMENT_DRY_RUN: 'true'
          BEATLESS_ROOT: ${{ github.workspace }}/.tmp/beatless
          RECEIPT_FIXTURE_TEST: ${{ github.workspace }}/scripts/ci/test_receipt_schema_gate.sh
        run: |
          mkdir -p .tmp/beatless/metrics .tmp/beatless/dispatch-results .tmp/beatless/scripts
          cp -f scripts/rawcli/*.sh .tmp/beatless/scripts/
          chmod +x .tmp/beatless/scripts/*.sh
          bash scripts/rawcli/rawcli_experiment_batch.sh CI-EXPERIMENT-DRYRUN
